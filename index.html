<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>CryptoHeat Screener</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Courier New',monospace; padding:20px; }
h1 { color:#58a6ff; margin-bottom:8px; font-size:20px; }
.info { color:#8b949e; font-size:13px; margin-bottom:14px; }
.filters { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
.filters label { color:#8b949e; font-size:13px; }
.filters input, .filters select { background:#161b22; color:#e6edf3; border:1px solid #30363d; padding:4px 8px; border-radius:4px; font-size:13px; }
.filters button { background:#238636; color:white; border:none; padding:5px 14px; border-radius:4px; cursor:pointer; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:#161b22; color:#8b949e; padding:7px 10px; text-align:left; border-bottom:1px solid #30363d; position:sticky; top:0; }
td { padding:6px 10px; border-bottom:1px solid #21262d; }
tr:hover td { background:#161b22; }
.up { color:#3fb950; font-weight:bold; }
.dn { color:#f85149; font-weight:bold; }
.bar { display:inline-block; height:8px; border-radius:3px; margin-right:6px; vertical-align:middle; }
.short { background:#3d1f1f; color:#f85149; padding:2px 7px; border-radius:3px; font-size:11px; }
.long { background:#1f3d2a; color:#3fb950; padding:2px 7px; border-radius:3px; font-size:11px; }
</style>
</head>
<body>
<h1>🔥 CryptoHeat Live Screener</h1>
<div class="info">Оновлення через <b id="cd">30</b>с | Останнє: <span id="lt">-</span> | Монет: <span id="cnt">-</span></div>
<div class="filters">
  <label>Мін. зміна: <input type="number" id="mc" value="5" style="width:55px">%</label>
  <label>Мін. обєм: <input type="number" id="mv" value="10" style="width:65px">млн</label>
  <label>Напрямок: <select id="dr"><option value="all">Всі</option><option value="SHORT">SHORT</option><option value="LONG">LONG</option></select></label>
  <label>Сорт: <select id="sr"><option value="chg">Зміна</option><option value="score">Score</option><option value="vol">Обєм</option></select></label>
  <button onclick="load()">🔄 Оновити</button>
</div>
<div id="wrap"><div style="text-align:center;padding:40px;color:#8b949e">Завантаження...</div></div>
<script>
let t=60,iv;
function score(chg,vol){let s=0;if(Math.abs(chg)>=5)s+=2;if(Math.abs(chg)>=10)s+=1;if(Math.abs(chg)>=20)s+=1;if(vol>=100)s+=1;if(vol>=500)s+=1;return s;}
async function load(){
  try{
    const url='https://fapi.binance.com/fapi/v1/ticker/24hr';
    const r=await fetch(url);
    const data=await r.json();
    if(!Array.isArray(data)){document.getElementById('wrap').innerHTML='<div style="text-align:center;padding:30px;color:#f85149">Binance API недоступний, спробуйте ще раз</div>';return;}
    const mc=parseFloat(document.getElementById('mc').value)||5;
    const mv=(parseFloat(document.getElementById('mv').value)||10)*1e6;
    const dr=document.getElementById('dr').value;
    const sr=document.getElementById('sr').value;
    let rows=data.filter(d=>d.symbol&&d.symbol.endsWith('USDT')&&parseFloat(d.quoteVolume)>=mv)
      .map(d=>{const chg=parseFloat(d.priceChangePercent);const vol=parseFloat(d.quoteVolume)/1e6;return{sym:d.symbol.replace('USDT',''),chg,vol,price:parseFloat(d.lastPrice),sc:score(chg,vol),dir:chg>0?'SHORT':'LONG'};})
      .filter(d=>Math.abs(d.chg)>=mc).filter(d=>dr==='all'||d.dir===dr);
    if(sr==='chg')rows.sort((a,b)=>Math.abs(b.chg)-Math.abs(a.chg));
    else if(sr==='score')rows.sort((a,b)=>b.sc-a.sc);
    else rows.sort((a,b)=>b.vol-a.vol);
    document.getElementById('cnt').textContent=rows.length;
    document.getElementById('lt').textContent=new Date().toLocaleTimeString('uk-UA');
    if(!rows.length){document.getElementById('wrap').innerHTML='<div style="text-align:center;padding:30px;color:#8b949e">Немає монет</div>';return;}
    let h='<table><thead><tr><th>#</th><th>Монета</th><th>Ціна</th><th>Зміна 24г</th><th>Обєм</th><th>Score</th><th>Напрямок</th></tr></thead><tbody>';
    rows.forEach((r,i)=>{
      const cl=r.chg>0?'up':'dn';const sg=r.chg>0?'+':'';
      const bw=Math.min(r.sc*15,90);const bc=r.sc>=5?'#f0883e':r.sc>=3?'#238636':'#444';
      const fp=r.price<0.001?r.price.toFixed(6):r.price<1?r.price.toFixed(4):r.price.toFixed(2);
      h+=`<tr><td style="color:#8b949e">${i+1}</td><td><b>${r.sym}</b></td><td style="color:#8b949e">${fp}</td><td class="${cl}">${sg}${r.chg.toFixed(1)}%</td><td style="color:#8b949e">${r.vol.toFixed(0)}млн</td><td><span class="bar" style="width:${bw}px;background:${bc}"></span><b>${r.sc}/6</b></td><td><span class="${r.dir.toLowerCase()}">${r.dir}</span></td></tr>`;
    });
    document.getElementById('wrap').innerHTML=h+'</tbody></table>';
  }catch(e){document.getElementById('wrap').innerHTML='<div style="text-align:center;padding:30px;color:#f85149">Помилка: '+e.message+'</div>';}
}
function tick(){clearInterval(iv);t=60;iv=setInterval(()=>{document.getElementById('cd').textContent=--t;if(t<=0){load();t=60;}},1000);}
load();tick();
</script>
</body>
</html>
